    <text x="0" y="52" font-family="Segoe UI, Ubuntu, Cantarell, Arial, sans-serif" font-size="24" font-weight="500" fill="#C8C8C8" letter-spacing="1.2">TRACE. EXPLAIN. OPTIMIZE.</text>
    <rect x="0" y="82" width="748" height="6" rx="3" fill="#EFEFEF"/>
  </g>
</svg>
